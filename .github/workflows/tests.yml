name: Tests

on:
  pull_request_target:
    types:
      - opened

jobs:
  test_laravel_9:
    uses:  jobmetric/laravel-package-tester/.github/workflows/tester.yml
    with:
      package_name: jobmetric/laravel-env-modifier
      date_format: jalali
      calendar_type: jalali
      timezone: Asia/Tehran
    secrets:
      bot_token: ${{ secrets.TELEGRAM_NOTIFICATION_BOT_TOKEN }}
      chat_id: ${{ secrets.TELEGRAM_NOTIFICATION_CHAT_ID_TEST }}